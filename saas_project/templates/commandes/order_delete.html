{% extends "base.html" %}

{% block content %}
    <h2>Supprimer une commande</h2>

    <p>
        Etes vous sur de vouloir supprimer cette commande ?
        <strong>{{order.client}}</strong>
    </p>

    <form method="post">

        {% csrf_token %}

        <button class="btn btn-danger">
            Oui supprimer
        </button>

        <a class="btn btn-secondary" 
            href="{% url 'order_list' %}">
            Annuler
        </a>
    </form>
{% endblock %}
