<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>

<body>

<h1>Dashboard</h1>

<p>Bienvenue {{ request.user.username }}</p>

<hr>

<h3>Statistiques</h3>

<ul>
    <li>Total clients : {{ total_clients }}</li>
    <li>Total produits : {{ total_produits }}</li>
    <li>Total commandes : {{ total_commandes }}</li>
</ul>

<hr>

<form method="post" action="{% url 'logout' %}">
    {% csrf_token %}

    <button type="submit">
        Logout
    </button>
</form>

</body>
</html>
