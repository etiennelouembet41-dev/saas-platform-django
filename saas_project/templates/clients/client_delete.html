{% extends 'base.html' %}

{% block content %}
    <h2>Supprimer un Client</h2>

    <p>Etes vous sur de vouloir supprimer ?
        <strong>{{client.name}}</strong>
    </p>

    <form method="post">
        {% csrf_token %}
        
        <button class="btn btn-danger">
            Oui Supprimer
        </button>

        <a class="btn btn-secondary" href="{% url 'clients_list' %}">
            Annuler
        </a>
    </form>
{% endblock  %}
