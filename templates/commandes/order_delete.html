{% extends "base.html" %}

{% block content %}
    <h2>Delete an order</h2>

    <p>
        Are you sure you want to delete this command?
        <strong>{{order.client}}</strong>
    </p>

    <form method="post">

        {% csrf_token %}

        <button class="btn btn-danger">
            Yes delete
        </button>

        <a class="btn btn-secondary" 
            href="{% url 'order_list' %}">
            Cancel
        </a>
    </form>
{% endblock %}
