{% extends 'base.html' %}

{% block content %}
    <h2>Delete a Customer</h2>

    <p>Are you sure you want to delete it?
        <strong>{{client.name}}</strong>
    </p>

    <form method="post">
        {% csrf_token %}
        
        <button class="btn btn-danger">
            Yes Delete
        </button>

        <a class="btn btn-secondary" href="{% url 'clients_list' %}">
            Cancel
        </a>
    </form>
{% endblock  %}
