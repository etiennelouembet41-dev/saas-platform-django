  {% extends "base.html" %}

  {% block content %}
        <h2>Delete a Product</h2>

        <p>
            Are you sure you want to delete this product?
            <strong>{{products.name}}</strong>
        </p>

        <form method="post">
            {% csrf_token %}

            <button class="btn btn-danger">
                Yes delete
            </button>

            <a class="btn btn-secondary" 
                href="{% url 'products_list' %}">
                Cancel
            </a>
        </form>
  {% endblock  %}
