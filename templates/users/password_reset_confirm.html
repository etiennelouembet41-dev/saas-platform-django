{% extends 'base.html' %}
{% load widget_tweaks %}

{% block content %}

<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm rounded text-center p-4">
        <div class="card-body">
            <h2 class="mb-3">🔒 Reset password</h2>
            <p class="mb-4">Enter your new password:</p>

            <form method="post">
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3 text-start">
                        <label for="{{ field.id_for_label }}" class="form-label"><strong>{{ field.label }}</strong></label>
                        {{ field|add_class:"form-control form-control-sm" }}
                        {% for error in field.errors %}
                            <div class="text-danger">{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-dark btn-sm w-100">Change password</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
